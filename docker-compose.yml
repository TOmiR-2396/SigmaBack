services:

  # ── Backend (Spring Boot) ──────────────────────────────────────────────────
  backend:
    build: .
    container_name: gym-backend
    restart: unless-stopped
    expose:
      - "8080"        # solo accesible dentro de la red Docker (nginx hace proxy)
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PORT: "8080"
      JAVA_OPTS: "-Xms256m -Xmx512m"
      # Base de datos
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/gymdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: gymuser
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      # Mail
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      # URLs del frontend
      APP_FRONTEND_RESET_URL: ${APP_FRONTEND_RESET_URL}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL}
      # MercadoPago
      MP_INTEGRATOR_PUBLIC_KEY: ${MP_INTEGRATOR_PUBLIC_KEY}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET:-}
      MP_CLIENT_ID: ${MP_CLIENT_ID}
      MP_CLIENT_SECRET: ${MP_CLIENT_SECRET}
      MP_OAUTH_REDIRECT_URI: ${MP_OAUTH_REDIRECT_URI}
      MP_COMMISSION_PERCENT: ${MP_COMMISSION_PERCENT:-5.0}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gym-network

  # ── Base de datos ──────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: gym-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: gymdb
      MYSQL_USER: gymuser
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "--password=${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - gym-network

  # ── Nginx (proxy inverso + frontend estático) ──────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: gym-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      # Certificados Let's Encrypt (se generan con certbot en el host)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Directorio para el challenge HTTP de certbot
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - gym-network

volumes:
  dbdata:
    external: true

networks:
  gym-network:
    driver: bridge
