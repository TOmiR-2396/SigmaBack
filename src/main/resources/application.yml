spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  mail:
    host: ${MAIL_HOST:smtp.envialosimple.email}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        transport:
          protocol: smtp

jwt:
  secret: "YjFhMmMzZDRlNWY2ZzdoOGk5ajBrMWwybTNuNG81cDZxN3I4czl0MHUxdjJ3M3g0eTV6NmE3YjhjOWQwZTFmMmczaDRpNWo2azdsOG05bjBvMXAy"

# Dirección remitente por defecto (opcional). También puede venir de env: MAIL_FROM
mail:
  from: ${MAIL_FROM:}

multitenancy:
  header: ${TENANT_HEADER:X-Tenant-ID}
  default-tenant: ${TENANT_DEFAULT:sigma-gym}
  required: ${TENANT_REQUIRED:false}
  switches:
    cache-seconds: ${TENANT_SWITCH_CACHE:60}

## Credenciales de Mercado Pago (SIEMPRE usar variables de entorno, NUNCA commitear valores reales)
##
## Modelo Marketplace (Split 1:1):
##   integrator-public-key  → public key de GESTIGYM (el integrador/plataforma, siempre la misma)
##   access-token            → fallback; en producción cada tenant guarda el suyo en DB vía OAuth
##   commission-percent      → comisión default de gestigym (puede sobreescribirse por tenant en DB)
mercadopago:
  integrator-public-key: ${MP_INTEGRATOR_PUBLIC_KEY:}
  access-token: ${MP_ACCESS_TOKEN:}
  webhook-secret: ${MP_WEBHOOK_SECRET:}
  webhook-strict: ${MP_WEBHOOK_STRICT:false}
  commission-percent: ${MP_COMMISSION_PERCENT:5.0}
  client-id: ${MP_CLIENT_ID:}
  client-secret: ${MP_CLIENT_SECRET:}
  oauth-redirect-uri: ${MP_OAUTH_REDIRECT_URI:http://localhost:8081/api/mp/oauth/callback}
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}

# Google OAuth 2.0 (Google Sheets API)
google:
  client-id: ${GOOGLE_CLIENT_ID:}
  client-secret: ${GOOGLE_CLIENT_SECRET:}
  redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8081/api/google-sheets/oauth/callback}
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}

# URL base del frontend para reset de contraseña (debe terminar en ?token=)
app:
  frontend:
    reset-url: ${APP_FRONTEND_RESET_URL:http://localhost:5173/reset-password?token=}

---
spring:
  config:
    activate:
      on-profile: dev
  
  # H2 Database para desarrollo
  datasource:
    url: jdbc:h2:mem:gymdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

# Credenciales de prueba MercadoPago (solo dev)
# integrator-public-key vacía: frontend usa Checkout Pro redirect (evita loop del SDK en local)
# access-token: token de prueba del seller (en prod viene de DB por tenant vía OAuth)
mercadopago:
  integrator-public-key: ""
  access-token: TEST-1152328780570006-051819-ef4db10ac5b599bc0e74051aeed31c67-113499327
  commission-percent: 5.0

---
spring:
  config:
    activate:
      on-profile: prod
  
  # MySQL para producción
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:gymdb}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:gymuser}
    password: ${DB_PASSWORD:gympass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

  # Configuración de Spring Security mínima para test
#  security:
#    user:
#      name: admin
#      password: admin
#      roles: OWNER

# cambie el puerto a 8081 para evitar conflictos con otros servicios como docker que corren en 8080 y si lo mato al puerto se me cae todo
server:
  port: ${PORT:8081}

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace
