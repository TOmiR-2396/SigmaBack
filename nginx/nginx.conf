# nginx.conf — HTTP-only (paso 1: deploy inicial y obtención de certificados SSL)
# Una vez que tenés los certs de Let's Encrypt, reemplazalo con nginx.ssl.conf

server {
    listen 80;
    server_name sigmagym.com.ar www.sigmagym.com.ar;

    resolver 127.0.0.11 valid=30s;

    # Challenge de certbot (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── API Backend ────────────────────────────────────────────────────────
    location /api/ {
        set $backend_url http://backend:8080;
        proxy_pass         $backend_url/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /webhooks/ {
        set $backend_url http://backend:8080;
        proxy_pass         $backend_url/webhooks/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend React (SPA) ───────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché para assets estáticos (Vite genera nombres con hash)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
