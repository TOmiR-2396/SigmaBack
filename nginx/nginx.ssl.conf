# nginx.ssl.conf — HTTPS con Let's Encrypt (paso 2: después de certbot)
# Copiarlo sobre nginx.conf y recargar nginx:
#   cp nginx/nginx.ssl.conf nginx/nginx.conf
#   docker compose exec nginx nginx -s reload

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name sigmagym.com.ar www.sigmagym.com.ar;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name sigmagym.com.ar www.sigmagym.com.ar;

    ssl_certificate     /etc/letsencrypt/live/sigmagym.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sigmagym.com.ar/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── API Backend ────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /webhooks/ {
        proxy_pass         http://backend:8080/webhooks/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend React (SPA) ───────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
